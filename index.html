<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal | Smart Routine &amp; Product Advisor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Toast notification container -->
    <div id="toastContainer" class="toast-container"></div>

    <div class="page-wrapper">

      <!-- Header -->
      <header class="site-header">
        <img src="img/loreal-logo.png" alt="L'Oréal Logo" class="logo" />
        <p class="site-subtitle">Smart Routine &amp; Product Advisor</p>
      </header>

      <!-- Category Pills + Search -->
      <section class="filter-section">
        <p class="filter-label">Browse by Category</p>
        <div class="category-pills" id="categoryPills">
          <button class="pill" data-category="">All Products</button>
          <button class="pill" data-category="cleanser">Cleansers</button>
          <button class="pill" data-category="moisturizer">Moisturizers</button>
          <button class="pill" data-category="skincare">Skincare</button>
          <button class="pill" data-category="haircare">Haircare</button>
          <button class="pill" data-category="makeup">Makeup</button>
          <button class="pill" data-category="hair color">Hair Color</button>
          <button class="pill" data-category="hair styling">Hair Styling</button>
          <button class="pill" data-category="men's grooming">Men's Grooming</button>
          <button class="pill" data-category="suncare">Suncare</button>
          <button class="pill" data-category="fragrance">Fragrance</button>
        </div>
        <div class="search-wrap">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input
            id="productSearch"
            class="product-search"
            type="search"
            placeholder="Search products…"
            autocomplete="off"
          />
        </div>
      </section>

      <!-- Products Grid -->
      <div id="productsContainer" class="products-grid">
        <div class="empty-state">
          <i class="fa-solid fa-spa"></i>
          <p>Select a category to browse products</p>
        </div>
      </div>

      <!-- Selected Products Panel -->
      <div class="selected-products">
        <div class="selected-header">
          <h2>
            Your Selection
            <span class="selection-count" id="selectionCount">0</span>
          </h2>
          <button id="clearSelected" class="clear-btn" type="button" disabled>
            <i class="fa-solid fa-xmark"></i> Clear All
          </button>
        </div>

        <div id="selectedProductsList"></div>

        <!-- Skin type selector for personalized routine -->
        <div class="skin-type-row">
          <span class="skin-type-label">Skin type:</span>
          <div class="skin-type-pills" id="skinTypePills">
            <button class="skin-pill" data-type="normal">Normal</button>
            <button class="skin-pill" data-type="oily">Oily</button>
            <button class="skin-pill" data-type="dry">Dry</button>
            <button class="skin-pill" data-type="combination">Combination</button>
            <button class="skin-pill" data-type="sensitive">Sensitive</button>
          </div>
        </div>

        <button id="generateRoutine" class="generate-btn">
          <i class="fa-solid fa-wand-magic-sparkles"></i>
          Generate My Routine
        </button>
      </div>

      <!-- Chat Area -->
      <section class="chatbox">
        <div class="chat-header">
          <h2><i class="fa-solid fa-sparkles"></i> Your Beauty Advisor</h2>
          <button id="copyRoutineBtn" class="copy-btn" style="display:none" title="Copy routine to clipboard">
            <i class="fa-regular fa-copy"></i> Copy
          </button>
        </div>

        <div id="chatWindow" class="chat-window"></div>

        <div id="typingIndicator" class="typing-indicator" style="display:none">
          <span></span><span></span><span></span>
        </div>

        <form id="chatForm" class="chat-form">
          <label for="userInput" class="visually-hidden">Message</label>
          <input
            id="userInput"
            name="userInput"
            type="text"
            placeholder="Ask about ingredients, layering, tips…"
            autocomplete="off"
          />
          <button type="submit" id="sendBtn">
            <i class="fa-solid fa-paper-plane"></i>
            <span class="visually-hidden">Send</span>
          </button>
        </form>
      </section>

      <!-- Footer -->
      <footer class="site-footer">
        <p>&copy; 2025 L'Oréal. All rights reserved.</p>
        <nav>
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <!-- secrets.js holds your Cloudflare Worker URL -->
    <script src="secrets.js"></script>
    <script src="script.js"></script>
  </body>
</html>
